# Format: repo_path (relative to my-utils root) → target under $HOME (~)
# Avoid linking targets whose parent resolves inside the repo (create_links.sh skips circular cases).
config/my-utils.env ~/.my-utils.env
config/shell_init.bash ~/.shell_init.bash
# Optional Fish (after: apt/brew install fish): uncomment the next two lines and re-run links
# config/emit_fish_env.bash ~/.my-utils.emit-fish-env.bash
# config/fish/my-utils.fish ~/.config/fish/conf.d/my-utils.fish
config/pip/pip.conf ~/.pip/pip.conf
config/_bashrc    ~/.bashrc
config/_vimrc   ~/.vimrc
config/init.vim ~/.config/nvim/init.vim
config/coc-settings.json ~/.config/nvim/coc-settings.json
config/coc-settings.json ~/.vim/coc-settings.json
config/_tmux.conf   ~/.tmux.conf
config/_wgetrc   ~/.wgetrc
config/zellij/config.kdl ~/.config/zellij/config.kdl
# config/proxychains.conf   ~/.proxychains/proxychains.conf
config/_zshrc   ~/.zshrc
config/p10k.zsh ~/.p10k.zsh
config/dircolor/dircolors.256dark   ~/.dir_colors
# config/_vimperatorrc    ~/.vimperatorrc
# config/_pentadactylrc    ~/.pentadactylrc
# fonts   ~/.fonts
